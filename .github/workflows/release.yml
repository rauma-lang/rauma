name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform_os: windows
            platform_arch: x64
            archive_format: zip
            runs_on: windows-latest
            cc: gcc
            msystem: UCRT64
            msys_packages: >-
              make
              mingw-w64-ucrt-x86_64-gcc
              mingw-w64-ucrt-x86_64-python
          - name: Windows ARM64
            platform_os: windows
            platform_arch: arm64
            archive_format: zip
            runs_on: windows-11-arm
            cc: gcc
            msystem: CLANGARM64
            msys_packages: >-
              make
              mingw-w64-clang-aarch64-clang
              mingw-w64-clang-aarch64-gcc-compat
              mingw-w64-clang-aarch64-python
          - name: Linux x64
            platform_os: linux
            platform_arch: x64
            archive_format: tar.gz
            runs_on: ubuntu-latest
            cc: gcc
          - name: Linux ARM64
            platform_os: linux
            platform_arch: arm64
            archive_format: tar.gz
            runs_on: ubuntu-24.04-arm
            cc: gcc
          - name: macOS ARM64
            platform_os: macos
            platform_arch: arm64
            archive_format: tar.gz
            runs_on: macos-15
            cc: clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 toolchain
        if: matrix.platform_os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.msys_packages }}

      - name: Install Linux build tools
        if: matrix.platform_os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Export compiler choice
        shell: bash
        run: echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"

      - name: Build release package on Windows
        if: matrix.platform_os == 'windows'
        shell: msys2 {0}
        run: >
          powershell -NoProfile -ExecutionPolicy Bypass
          -File scripts/release/package.ps1
          -Version 0.1.0
          -PlatformOs ${{ matrix.platform_os }}
          -PlatformArch ${{ matrix.platform_arch }}
          -ArchiveFormat ${{ matrix.archive_format }}

      - name: Build release package on non-Windows
        if: matrix.platform_os != 'windows'
        shell: bash
        run: >
          pwsh -NoProfile -ExecutionPolicy Bypass
          -File scripts/release/package.ps1
          -Version 0.1.0
          -PlatformOs ${{ matrix.platform_os }}
          -PlatformArch ${{ matrix.platform_arch }}
          -ArchiveFormat ${{ matrix.archive_format }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform_os }}-${{ matrix.platform_arch }}
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release artifacts
        shell: bash
        run: |
          mkdir -p release-dist
          find dist -type f -exec cp {} release-dist/ \;

      - name: Merge checksum files
        shell: bash
        run: |
          cd release-dist
          cat SHA256SUMS-*.txt > SHA256SUMS.txt
          rm SHA256SUMS-*.txt

      - name: Write release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          # RauMa v0.1.0

          First self-hosted RauMa compiler release with multi-platform binaries.

          ## Included binaries

          - `rmc` - self-hosted RauMa compiler
          - `rmb` - C11 bootstrap compiler for recovery
          - `rauma-setup.sh` / `rauma-setup.ps1` - script installers

          ## Supported release targets

          - Windows x64
          - Windows ARM64
          - Linux x64
          - Linux ARM64
          - macOS ARM64

          ## Verified bootstrap chain

          `rmb -> rmc0 -> rmc1-real -> rmc2-real -> rmc3-real`

          Generated C exact comparison: PASS
          Behavior comparison: PASS

          ## Install

          Download the archive for your platform.
          Put `rmc` on PATH, or run the setup script for your platform.

          ## Known limitations

          - local module graph only
          - bridge C backend
          - no package manager
          - no stdlib lookup
          - no HIR/MIR
          - no LLVM/rmgen/rmlink
          EOF

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="v0.1.0"
          fi
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "RauMa v0.1.0" --notes-file RELEASE_NOTES.md
          fi
          gh release upload "$tag" release-dist/* --clobber
