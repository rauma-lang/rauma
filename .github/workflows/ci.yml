name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runs_on: windows-latest
            platform_os: windows
            platform_arch: x64
            cc: gcc
            msystem: UCRT64
            msys_packages: >-
              make
              mingw-w64-ucrt-x86_64-gcc
              mingw-w64-ucrt-x86_64-python
            full_test: true
          - name: Windows ARM64
            runs_on: windows-11-arm
            platform_os: windows
            platform_arch: arm64
            cc: gcc
            msystem: CLANGARM64
            msys_packages: >-
              make
              mingw-w64-clang-aarch64-clang
              mingw-w64-clang-aarch64-gcc-compat
              mingw-w64-clang-aarch64-python
            full_test: true
          - name: Linux x64
            runs_on: ubuntu-latest
            platform_os: linux
            platform_arch: x64
            cc: gcc
            full_test: true
          - name: Linux ARM64
            runs_on: ubuntu-24.04-arm
            platform_os: linux
            platform_arch: arm64
            cc: gcc
            full_test: true
          - name: macOS ARM64
            runs_on: macos-15
            platform_os: macos
            platform_arch: arm64
            cc: clang
            full_test: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 toolchain
        if: matrix.platform_os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.msys_packages }}

      - name: Install Linux build tools
        if: matrix.platform_os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Export compiler choice
        shell: bash
        run: echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"

      - name: Verify deterministic self-host chain on Windows
        if: matrix.platform_os == 'windows'
        shell: msys2 {0}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/release/verify-self-host.ps1

      - name: Verify deterministic self-host chain on non-Windows
        if: matrix.platform_os != 'windows'
        shell: bash
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/release/verify-self-host.ps1

      - name: Run bootstrap test suite on Windows
        if: matrix.platform_os == 'windows' && matrix.full_test
        shell: msys2 {0}
        working-directory: rmb
        run: make test

      - name: Run bootstrap test suite on non-Windows
        if: matrix.platform_os != 'windows' && matrix.full_test
        shell: bash
        working-directory: rmb
        run: make test

      - name: Test struct/enum parsing
        if: matrix.full_test
        shell: bash
        run: |
          rmb/build/debug/native/bin/main parse rmc/type/types.rm
          rmb/build/debug/native/bin/main parse rmc/type/symtab.rm
          rmb/build/debug/native/bin/main parse rmc/type/checker.rm

      - name: Test HIR/MIR/type/LSP modules
        if: matrix.full_test
        shell: bash
        run: |
          for f in rmc/hir/*.rm rmc/mir/*.rm rmc/type/*.rm rmc/lsp/*.rm; do
            rmb/build/debug/native/bin/main check "$f"
          done

      - name: Test stdlib modules
        if: matrix.full_test
        shell: bash
        run: |
          for f in std/collections/*.rm std/conv/*.rm std/core/*.rm std/io/*.rm std/math/*.rm std/str/*.rm; do
            rmb/build/debug/native/bin/main check "$f"
          done
          rmb/build/debug/native/bin/main build std/smoke.rm
          ./build/rmc_build_out

      - name: Dry-run setup scripts on non-Windows
        if: matrix.platform_os != 'windows'
        shell: bash
        run: bash scripts/install/rauma-setup.sh --dry-run --version v0.2.0

      - name: Dry-run setup scripts on Windows
        if: matrix.platform_os == 'windows'
        shell: msys2 {0}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/install/rauma-setup.ps1 -DryRun -Version v0.2.0
          bash scripts/install/rauma-setup.sh --dry-run --version v0.2.0

  lsp-test:
    name: LSP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build compiler
        shell: bash
        run: |
          cd rmb
          make
          ./build/rmb build ../rmc/main.rm
      - name: Test LSP protocol module
        shell: bash
        run: |
          rmb/build/debug/native/bin/main lsp --check-exits-immediately
          rmb/build/debug/native/bin/main lsp --capabilities

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build compiler
        shell: bash
        run: |
          cd rmb
          make
          ./build/rmb build ../rmc/main.rm
      - name: Run test suite with coverage
        shell: bash
        run: |
          rmb/build/debug/native/bin/main version
          rmb/build/debug/native/bin/main lsp --check-exits-immediately
          echo "Coverage report generation skipped (gcov not available)"
