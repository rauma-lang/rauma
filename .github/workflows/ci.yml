name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runs_on: windows-latest
            platform_os: windows
            platform_arch: x64
            cc: gcc
            shell: msys2 {0}
            msystem: UCRT64
            msys_packages: >-
              make
              mingw-w64-ucrt-x86_64-gcc
              mingw-w64-ucrt-x86_64-python
            full_test: true
          - name: Windows ARM64
            runs_on: windows-11-arm
            platform_os: windows
            platform_arch: arm64
            cc: gcc
            shell: msys2 {0}
            msystem: CLANGARM64
            msys_packages: >-
              make
              mingw-w64-clang-aarch64-clang
              mingw-w64-clang-aarch64-gcc-compat
              mingw-w64-clang-aarch64-python
            full_test: true
          - name: Linux x64
            runs_on: ubuntu-latest
            platform_os: linux
            platform_arch: x64
            cc: gcc
            shell: bash
            full_test: true
          - name: Linux ARM64
            runs_on: ubuntu-24.04-arm
            platform_os: linux
            platform_arch: arm64
            cc: gcc
            shell: bash
            full_test: true
          - name: macOS ARM64
            runs_on: macos-15
            platform_os: macos
            platform_arch: arm64
            cc: clang
            shell: bash
            full_test: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 toolchain
        if: matrix.platform_os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.msys_packages }}

      - name: Install Linux build tools
        if: matrix.platform_os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Export compiler choice
        shell: bash
        run: echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"

      - name: Verify deterministic self-host chain
        if: matrix.platform_os == 'windows'
        shell: ${{ matrix.shell }}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/release/verify-self-host.ps1

      - name: Verify deterministic self-host chain
        if: matrix.platform_os != 'windows'
        shell: ${{ matrix.shell }}
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/release/verify-self-host.ps1

      - name: Run bootstrap test suite
        if: matrix.full_test
        shell: ${{ matrix.shell }}
        working-directory: rmb
        run: make test

      - name: Dry-run setup scripts
        if: matrix.platform_os != 'windows'
        shell: ${{ matrix.shell }}
        run: bash scripts/install/rauma-setup.sh --dry-run --version v0.1.0

      - name: Dry-run setup scripts
        if: matrix.platform_os == 'windows'
        shell: ${{ matrix.shell }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/install/rauma-setup.ps1 -DryRun -Version v0.1.0
          bash scripts/install/rauma-setup.sh --dry-run --version v0.1.0
